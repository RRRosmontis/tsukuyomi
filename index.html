<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
     <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%90%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" sizes="180x180" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%90%3C/text%3E%3C/svg%3E">
    <title>T S U K U Y O M I</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; 
            display: block;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0e17;
            }
        }
        @media (prefers-color-scheme: light) {
            body {
                background-color: #f0f2f5;
            }
        }
    </style>
</head>
<body>
    <iframe id="playerFrame" src="https://live.rrrosmontis.icu/players/player.html"></iframe>
    <script>
        const iframe = document.getElementById('playerFrame');
        const params = window.location.search;
        if (params) {
            iframe.src = "https://live.rrrosmontis.icu/players/player.html" + params;
        }
    </script>
</body>
</html>
